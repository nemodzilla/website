mainSections   = ["post"]
rssFullContent = true
favicon        = "img/avatar.png"

[footer]
    since = 2024

[sidebar]
    emoji    = "💤"
    subtitle = "Nemo's website"

    [sidebar.avatar]
        enabled = true
        local   = true
        src     = "img/avatar.png"

[article]
    [article.license]
        enabled = false


[widgets]
    homepage = [
        { type = "search" },
        { type = "archives", params = { limit = 5 } },
        { type = "categories", params = { limit = 10 } },
        { type = "tag-cloud", params = { limit = 10 } },
    ]
    page = [{ type = "toc" }]

[comments]
    enabled  = false

[cookies]
    enabled = false

[colorScheme]
    toggle  = true
    default = "auto"

[[social]]
    identifier = "github"
    name       = "GitHub"
    url        = "https://github.com/Nemodzilla"
    [social.params]
        icon = "github"

[[social]]
    identifier = "linkedin"
    name       = "LinkedIn"
    url        = "https://www.linkedin.com/in/noemie-mancini/"
    [social.params]
        icon = "linkedin"